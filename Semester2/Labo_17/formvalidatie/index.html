<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Form Validatie</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<form id="formulier">

    <div>
        <label for="voornaam">Voornaam</label>
        <input type="text" id="voornaam" maxlength="30">
        <span class="errorMessage"></span>
    </div>

    <br>

    <div>
        <label for="familienaam">Familienaam</label>
        <input type="text" id="familienaam" maxlength="50">
        <span class="errorMessage"></span>
    </div>

    <br>

    <div>
        <label for="geboorte">Geboortedatum</label>
        <input type="text" id="geboorte" placeholder="yyyy-mm-dd">
        <span class="errorMessage"></span>
    </div>

    <br>

    <div>
        <label for="email">Email</label>
        <input type="text" id="email">
        <span class="errorMessage"></span>
    </div>

    <br>

    <div>
        <label for="kinderen">Aantal kinderen</label>
        <input type="number" id="kinderen">
        <span class="errorMessage"></span>
    </div>

    <br>

    <button type="button" id="valideer">Valideer</button>

</form>

<script src="scripts/script.js"></script>

</body>
</html>
